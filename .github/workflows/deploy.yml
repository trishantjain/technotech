name: Deploy EMS App

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    # Install Node for build
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    # Install frontend dependencies
    - name: Install Frontend Dependencies
      run: |
        cd iot-dashboard-frontend
        npm install

    # Build React App
    - name: Build Frontend
      run: |
        cd iot-dashboard-frontend
        npm run build

    - name: Upload Frontend Build
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "iot-dashboard-frontend/build"
        target: "/home/ubuntu/technotech/iot-dashboard-frontend/"

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          cd /home/ubuntu/technotech/
          
          git fetch origin
          git reset --hard origin/master

          cd server
          npm install

          pm2 restart all